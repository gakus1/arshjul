<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Årshjul</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
.app { display: flex; flex-direction: column; align-items: center; padding: 24px 16px 80px; gap: 20px; }

/* Top bar */
.topbar { width: 100%; max-width: 960px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.year-nav { display: flex; align-items: center; gap: 8px; }
.year-nav button { background: #fff; border: 0.5px solid #c0bfb8; border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 15px; }
.year-nav button:hover { background: #e8e6e0; }
.btn-primary { background: #1a1a18; color: #f5f4f0; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; cursor: pointer; }
.btn-primary:hover { background: #333; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.view-toggle { display: flex; border: 0.5px solid #c0bfb8; border-radius: 8px; overflow: hidden; background: #fff; }
.view-toggle button { background: none; border: none; padding: 7px 14px; cursor: pointer; font-size: 13px; color: #666; }
.view-toggle button.active { background: #1a1a18; color: #fff; }

/* Wheel tabs */
.wheel-tabs { width: 100%; max-width: 960px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.wheel-tab { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 10px; border: 0.5px solid #d8d6ce; background: #fff; cursor: pointer; font-size: 14px; transition: all .15s; }
.wheel-tab:hover { background: #f0ede6; }
.wheel-tab.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.wheel-tab .tab-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.wheel-tab .tab-settings { background: none; border: none; cursor: pointer; opacity: .5; font-size: 14px; padding: 0 0 0 4px; color: inherit; }
.wheel-tab .tab-settings:hover { opacity: 1; }
.btn-add-wheel { padding: 8px 14px; border-radius: 10px; border: 0.5px dashed #c0bfb8; background: #fff; cursor: pointer; font-size: 14px; color: #888; }
.btn-add-wheel:hover { background: #f0ede6; color: #444; }

/* Countdown */
.countdown { width: 100%; max-width: 960px; background: #fff; border: 0.5px solid #d8d6ce; border-radius: 12px; padding: 14px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.countdown-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.countdown-text { font-size: 14px; color: #555; flex: 1; }
.countdown-text strong { color: #1a1a18; font-weight: 500; }
.countdown-days { font-size: 22px; font-weight: 500; color: #1a1a18; }
.countdown-label { font-size: 11px; color: #999; text-align: center; }

/* Filter */
.filter-bar { width: 100%; max-width: 960px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.filter-bar input { flex: 1; min-width: 180px; border: 0.5px solid #c0bfb8; border-radius: 8px; padding: 8px 12px; font-size: 14px; background: #fff; font-family: inherit; outline: none; }
.filter-bar input:focus { border-color: #888; }
.filter-bar select { border: 0.5px solid #c0bfb8; border-radius: 8px; padding: 8px 12px; font-size: 14px; background: #fff; font-family: inherit; outline: none; cursor: pointer; }

/* Wheel */
.wheel-section { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
.wheel-wrap { position: relative; width: 620px; height: 620px; flex-shrink: 0; }
canvas#wheel { position: absolute; top: 0; left: 0; cursor: pointer; }
.center-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 130px; height: 130px; border-radius: 50%; background: #f5f4f0;
  display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; text-align: center; padding: 8px; }
.center-label span:first-child { font-size: 22px; font-weight: 500; }
.center-label span:last-child { font-size: 10px; color: #999; margin-top: 2px; }
.tooltip { position: fixed; background: #1a1a18; color: #fff; padding: 7px 12px; border-radius: 8px; font-size: 13px; pointer-events: none; z-index: 500; display: none; max-width: 220px; line-height: 1.5; }

/* Below wheel */
.below-wheel { width: 100%; max-width: 960px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.card { background: #fff; border: 0.5px solid #d8d6ce; border-radius: 12px; padding: 16px; }
.card-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: #999; margin-bottom: 10px; }
.evt-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
.evt-item { border-left: 3px solid #ccc; border-radius: 0 8px 8px 0; background: #fafaf8; cursor: pointer; transition: background .15s; }
.evt-item:hover { background: #f0ede6; }
.evt-item.active-now { background: #f0f9f4; }
.evt-item-body { padding: 7px 10px; }
.evt-item .en { font-size: 13px; font-weight: 500; }
.evt-item .ed { font-size: 11px; color: #888; margin-top: 1px; }
.evt-item .next-h { font-size: 10px; color: #4BA87D; margin-top: 2px; }
.badge-live { font-size: 9px; background: #d4f0e4; color: #1a7a4a; border-radius: 4px; padding: 1px 5px; font-weight: 500; margin-left: 4px; }
.empty { font-size: 13px; color: #bbb; padding: 4px 0; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; max-height: 220px; overflow-y: auto; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.readonly-badge { font-size: 11px; background: #f0ede6; color: #888; border-radius: 6px; padding: 2px 8px; }

/* Timeline */
.timeline { width: 100%; max-width: 960px; display: flex; flex-direction: column; }
.tl-month { margin-top: 24px; }
.tl-month:first-child { margin-top: 0; }
.tl-month-header { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em; color: #999; padding: 0 0 10px 20px; display: flex; align-items: center; gap: 10px; }
.tl-month-header::after { content: ''; flex: 1; height: 0.5px; background: #d8d6ce; }
.tl-items { display: flex; flex-direction: column; gap: 8px; }
.tl-item { background: #fff; border: 0.5px solid #d8d6ce; border-radius: 12px; padding: 16px 20px; display: flex; gap: 16px; cursor: pointer; transition: background .15s; position: relative; overflow: hidden; }
.tl-item:hover { background: #fafaf8; }
.tl-item.active-now { border-color: #9fdcc0; background: #f6fdf9; }
.tl-item.active-now::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #4BA87D; border-radius: 12px 0 0 12px; }
.tl-accent { width: 4px; border-radius: 4px; flex-shrink: 0; min-height: 40px; }
.tl-body { flex: 1; }
.tl-name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
.tl-dates { font-size: 13px; color: #888; margin-top: 2px; }
.tl-hendelser { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.tl-h-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; }
.tl-h-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.tl-h-date { font-weight: 500; min-width: 110px; color: #444; }
.badge-live-tl { font-size: 10px; background: #d4f0e4; color: #1a7a4a; border-radius: 4px; padding: 2px 7px; font-weight: 500; }

/* Detail */
.detail-card { background: #fff; border: 0.5px solid #d8d6ce; border-radius: 12px; padding: 20px; width: 100%; max-width: 960px; }
.detail-card h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.detail-dates { font-size: 13px; color: #888; margin-bottom: 14px; }
.detail-section { margin-bottom: 14px; }
.detail-section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: #999; margin-bottom: 8px; }
.detail-notes { font-size: 14px; line-height: 1.75; white-space: pre-wrap; background: #fafaf8; border-radius: 8px; padding: 14px; border: 0.5px solid #e8e6e0; min-height: 40px; }
.hendelse-list { display: flex; flex-direction: column; gap: 6px; }
.hendelse-row { display: flex; align-items: center; gap: 10px; background: #fafaf8; border-radius: 8px; padding: 8px 12px; border: 0.5px solid #e8e6e0; }
.hendelse-row .h-date { font-size: 13px; font-weight: 500; min-width: 120px; }
.hendelse-row .h-name { font-size: 13px; flex: 1; }
.hendelse-row .h-del { background: none; border: none; color: #bbb; cursor: pointer; font-size: 16px; padding: 0 4px; }
.hendelse-row .h-del:hover { color: #a03030; }
.detail-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
.btn-sec { border: 0.5px solid #c0bfb8; background: #fff; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
.btn-sec:hover { background: #f0ede6; }
.btn-del { border: 0.5px solid #e2b0b0; background: #fff; color: #a03030; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }

/* Modal shared */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
.modal h2 { margin-bottom: 16px; font-size: 18px; font-weight: 500; }
.modal label { font-size: 13px; color: #666; display: block; margin-top: 12px; margin-bottom: 4px; }
.modal input[type=text], .modal input[type=date], .modal textarea { width: 100%; border: 0.5px solid #c0bfb8; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; background: #fafaf8; outline: none; }
.modal input:focus, .modal textarea:focus { border-color: #888; }
.modal textarea { height: 90px; resize: vertical; }
.modal .row { display: flex; gap: 12px; }
.modal .row > div { flex: 1; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.modal-section { border-top: 0.5px solid #e8e6e0; margin-top: 16px; padding-top: 16px; }
.modal-section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: #999; margin-bottom: 12px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.toggle-row label { font-size: 13px; color: #444; margin: 0; }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #d8d6ce; border-radius: 20px; cursor: pointer; transition: .2s; }
.toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-slider { background: #1a1a18; }
.toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

/* Color picker */
.color-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 6px; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .1s; outline: 2px solid transparent; outline-offset: 2px; }
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.selected { outline: 2.5px solid #1a1a18; transform: scale(1.12); }
.hendelse-add { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.hendelse-add input[type=date] { flex: 0 0 148px; }
.hendelse-add input[type=text] { flex: 1; min-width: 120px; }
.hendelse-add button { background: #1a1a18; color: #fff; border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.hendelse-preview { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
.hp-row { display: flex; align-items: center; gap: 8px; background: #f5f4f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
.hp-row span { flex: 1; }
.hp-row button { background: none; border: none; color: #bbb; cursor: pointer; font-size: 15px; }
.hp-row button:hover { color: #a03030; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
@media (max-width: 680px) { .wheel-wrap { width: 340px; height: 340px; } .below-wheel { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <h1 style="font-size:22px;font-weight:500">Årshjul</h1>
      <div class="year-nav">
        <button onclick="changeYear(-1)">←</button>
        <span id="yr-label" style="font-size:18px;font-weight:500;min-width:48px;text-align:center"></span>
        <button onclick="changeYear(1)">→</button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button id="btn-wheel" class="active" onclick="setView('wheel')">Hjul</button>
        <button id="btn-list" onclick="setView('list')">Tidslinje</button>
      </div>
      <button class="btn-primary" id="btn-new-event" onclick="openEventModal(null)">+ Nytt element</button>
    </div>
  </div>

  <!-- Wheel tabs -->
  <div class="wheel-tabs" id="wheel-tabs"></div>

  <!-- Countdown -->
  <div class="countdown" id="countdown" style="display:none">
    <div class="countdown-dot" id="cd-dot"></div>
    <div class="countdown-text" id="cd-text"></div>
    <div style="text-align:center">
      <div class="countdown-days" id="cd-days"></div>
      <div class="countdown-label" id="cd-label">dager igjen</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <input type="text" id="filter-text" placeholder="Søk..." oninput="applyFilter()">
    <select id="filter-month" onchange="applyFilter()">
      <option value="">Alle måneder</option>
    </select>
  </div>

  <!-- Wheel view -->
  <div id="view-wheel" class="wheel-section">
    <div class="wheel-wrap">
      <canvas id="wheel" width="620" height="620"></canvas>
      <div class="center-label">
        <span id="center-year"></span>
        <span id="center-name">Årshjul</span>
      </div>
    </div>
    <div class="below-wheel">
      <div class="card">
        <div class="card-title">Valgt måned</div>
        <div style="font-size:18px;font-weight:500" id="sel-month">—</div>
        <div style="font-size:13px;color:#999;margin-top:2px" id="sel-count"></div>
      </div>
      <div class="card">
        <div class="card-title" id="panel-evt-title">Elementer</div>
        <div class="evt-list" id="evt-list"><p class="empty">Klikk på en måned</p></div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0">
          <div class="card-title" style="margin-bottom:0">Fargekoder</div>
          <button onclick="toggleLegend()" id="legend-btn" style="background:none;border:0.5px solid #c0bfb8;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;color:#666">Vis</button>
        </div>
        <div class="legend" id="legend" style="display:none;margin-top:10px"><p class="empty">Ingen elementer ennå</p></div>
      </div>
    </div>
  </div>

  <!-- Timeline view -->
  <div id="view-list" class="timeline" style="display:none">
    <div id="timeline-items"></div>
  </div>

  <!-- Detail panel -->
  <div class="detail-card" id="detail-card" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <div id="det-dot" style="width:12px;height:12px;border-radius:50%;flex-shrink:0"></div>
      <h2 id="det-name"></h2>
    </div>
    <div class="detail-dates" id="det-dates"></div>
    <div class="detail-section" id="det-hendelser-section">
      <div class="detail-section-title" id="det-hendelser-title">Hendelser</div>
      <div class="hendelse-list" id="det-hendelser"></div>
    </div>
    <div class="detail-section" id="det-notes-section">
      <div class="detail-section-title">Notater</div>
      <div class="detail-notes" id="det-notes"></div>
    </div>
    <div class="detail-actions" id="det-actions">
      <button class="btn-sec" onclick="editSelected()">Rediger</button>
      <button class="btn-del" onclick="deleteSelected()">Slett</button>
      <button class="btn-sec" onclick="closeDetail()">Lukk</button>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<!-- Event Modal -->
<div class="modal-bg" id="event-modal-bg">
  <div class="modal">
    <h2 id="event-modal-title">Nytt element</h2>
    <label id="lbl-name">Navn</label>
    <input id="f-name" type="text">
    <div class="row" id="date-row">
      <div><label id="lbl-start-date">Startdato</label><input id="f-start" type="date" onchange="onStartChange()"></div>
      <div id="end-date-col"><label>Sluttdato</label><input id="f-end" type="date"></div>
    </div>
    <label>Farge</label>
    <div class="color-grid" id="color-grid"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
      <label style="margin:0;font-size:13px;color:#666">Egendefinert:</label>
      <input type="color" id="custom-color" style="width:36px;height:36px;border:0.5px solid #c0bfb8;border-radius:50%;cursor:pointer;padding:2px;background:none;">
    </div>
    <div id="hendelser-section">
      <label id="lbl-hendelse">Hendelser</label>
      <div class="hendelse-add">
        <input type="date" id="h-date">
        <input type="text" id="h-name" placeholder="f.eks. Evalueringsmøte">
        <button onclick="addHendelse()">+ Legg til</button>
      </div>
      <div class="hendelse-preview" id="h-preview"></div>
    </div>
    <div id="notes-section">
      <label>Notater</label>
      <textarea id="f-notes"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeEventModal()">Avbryt</button>
      <button class="btn-primary" onclick="saveEvent()">Lagre</button>
    </div>
  </div>
</div>

<!-- Wheel Settings Modal -->
<div class="modal-bg" id="wheel-modal-bg">
  <div class="modal">
    <h2 id="wheel-modal-title">Nytt årshjul</h2>
    <label>Navn på årshjulet</label>
    <input id="w-name" type="text" placeholder="f.eks. Bursdager">
    <label>Farge på fanen</label>
    <div class="color-grid" id="wheel-color-grid"></div>
    <div class="modal-section">
      <div class="modal-section-title">Tilpass tekster</div>
      <label>Hva heter et element? (f.eks. Arrangement, Person)</label>
      <input id="w-item-label" type="text" placeholder="Arrangement">
      <label>Hva heter en hendelse? (f.eks. Hendelse, Milepæl)</label>
      <input id="w-event-label" type="text" placeholder="Hendelse">
      <label>Nedtellingstekst (f.eks. Neste bursdag)</label>
      <input id="w-countdown-label" type="text" placeholder="Neste arrangement">
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Innstillinger</div>
      <div class="toggle-row">
        <label>Nedtelling viser neste hendelse</label>
        <label class="toggle"><input type="checkbox" id="w-countdown-hendelse"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>Standard visning: Tidslinje</label>
        <label class="toggle"><input type="checkbox" id="w-default-list"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>Enkeltdags-modus (kun én dato)</label>
        <label class="toggle"><input type="checkbox" id="w-single-day"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>Skrivebeskyttet (ingen kan redigere)</label>
        <label class="toggle"><input type="checkbox" id="w-readonly"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>Egen farge per hendelse</label>
        <label class="toggle"><input type="checkbox" id="w-hendelse-color"><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>Vis hendelser</label>
        <label class="toggle"><input type="checkbox" id="w-show-hendelser" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>Vis notater</label>
        <label class="toggle"><input type="checkbox" id="w-show-notes" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="w-delete-btn" style="display:none;margin-right:auto" onclick="deleteWheel()">Slett årshjul</button>
      <button class="btn-sec" onclick="closeWheelModal()">Avbryt</button>
      <button class="btn-primary" onclick="saveWheel()">Lagre</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://cxqvenjholhtijnrnwau.supabase.co';
const SB_KEY='sb_publishable_pn7_PfMvVPVpI421gQtWmQ_tyDGgmFc';
const H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const api = {
  getWheels: ()=>fetch(`${SB_URL}/rest/v1/wheels?order=created_at.asc`,{headers:H}).then(r=>r.json()),
  saveWheel: w=>fetch(`${SB_URL}/rest/v1/wheels`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(w)}).then(r=>r.json()),
  updateWheel: (id,w)=>fetch(`${SB_URL}/rest/v1/wheels?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(w)}).then(r=>r.json()),
  deleteWheel: id=>fetch(`${SB_URL}/rest/v1/wheels?id=eq.${id}`,{method:'DELETE',headers:H}),
  getEvents: wid=>fetch(`${SB_URL}/rest/v1/events?wheel_id=eq.${wid}&order=start_date.asc`,{headers:H}).then(r=>r.json()),
  saveEvent: e=>fetch(`${SB_URL}/rest/v1/events`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(e)}).then(r=>r.json()),
  updateEvent: (id,e)=>fetch(`${SB_URL}/rest/v1/events?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(e)}).then(r=>r.json()),
  deleteEvent: id=>fetch(`${SB_URL}/rest/v1/events?id=eq.${id}`,{method:'DELETE',headers:H}),
};

const MONTHS=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const COLORS=['#C9624F','#D4845A','#D4A24C','#C9B84C','#8FB84C','#4BA87D','#3a8a6a','#4AABB8','#5A7FBB','#6A6FBB','#B87BAC','#D4627A','#7B6FBF','#6B9E3A','#4a7fb5','#C47A40','#888780','#5a5a5a','#A0522D','#2E7D6B'];
const RING_COLORS=['#4a7fb5','#5a9bd4','#3aab7a','#74c476','#a8c43a','#f0c030','#f0a020','#e06040','#c04040','#9050b0','#6050b8','#4a7fb5'];

let currentYear=new Date().getFullYear();
let wheels=[], currentWheelId=null, events=[], filteredEvents=[];
let selectedMonth=null, selectedId=null, editingId=null, editingWheelId=null;
let selectedColor=COLORS[0], selectedWheelColor=COLORS[0];
let pendingHendelser=[], currentView='wheel';
const TODAY=new Date(); TODAY.setHours(0,0,0,0);
const CX=310,CY=310,OR=295,IR=115,EVENT_ARC_W=20,HENDELSE_R=OR-EVENT_ARC_W-8,HENDELSE_DOT_R=5;
let tooltipData=[];

function cw(){return wheels.find(w=>w.id===currentWheelId)||null;}

async function init(){
  setYear(currentYear);
  buildMonthFilter();
  setupTooltip();
  try {
    const ws=await api.getWheels();
    if(Array.isArray(ws)&&ws.length){
      wheels=ws;
      currentWheelId=ws[0].id;
    } else if(Array.isArray(ws)&&ws.length===0){
      // Create default wheel
      const res=await api.saveWheel({name:'Arrangementer',color:'#5A7FBB',countdown_label:'Neste arrangement',item_label:'Arrangement',event_label:'Hendelse',default_view:'wheel',readonly:false,single_day:false,show_notes:true,show_hendelser:true});
      if(Array.isArray(res)&&res[0]){wheels=[res[0]];currentWheelId=res[0].id;}
    }
    renderWheelTabs();
    await loadEvents();
  } catch(e){toast('Nettverksfeil.');}
}

function setYear(y){currentYear=y;document.getElementById('yr-label').textContent=y;document.getElementById('center-year').textContent=y;}
function changeYear(d){setYear(currentYear+d);applyFilter();}

async function loadEvents(){
  if(!currentWheelId)return;
  try {
    const data=await api.getEvents(currentWheelId);
    if(Array.isArray(data)){
      events=data;
      applyWheelSettings();
      applyFilter();
    }
  } catch(e){toast('Klarte ikke laste elementer.');}
}

function applyWheelSettings(){
  const w=cw(); if(!w)return;
  const ro=w.readonly;
  document.getElementById('btn-new-event').style.display=ro?'none':'flex';
  document.getElementById('center-name').textContent=w.name;
  document.getElementById('panel-evt-title').textContent=w.item_label||'Elementer';
  const view=w.default_view||'wheel';
  setView(currentView==='wheel'||currentView==='list'?currentView:view);
}

function buildMonthFilter(){
  const sel=document.getElementById('filter-month');
  MONTHS.forEach((m,i)=>{const o=document.createElement('option');o.value=i;o.textContent=m;sel.appendChild(o);});
}

function applyFilter(){
  const ft=document.getElementById('filter-text').value.toLowerCase();
  const fm=document.getElementById('filter-month').value;
  filteredEvents=events.filter(e=>{
    const nameMatch=e.name.toLowerCase().includes(ft);
    const yearMatch=new Date(e.start_date).getFullYear()===currentYear||new Date(e.end_date).getFullYear()===currentYear;
    const monthMatch=fm===''||getEventsForMonth(parseInt(fm),events).some(ev=>ev.id===e.id);
    return nameMatch&&yearMatch&&monthMatch;
  });
  updateCountdown();drawWheel();renderSidebar();renderLegend();renderTimeline();
}

function updateCountdown(){
  const w=cw(); const cd=document.getElementById('countdown');
  const next=nextUpcoming(filteredEvents);
  if(!next||daysUntil(next.start_date)<0){cd.style.display='none';return;}
  const days=daysUntil(next.start_date);
  cd.style.display='flex';
  document.getElementById('cd-dot').style.background=next.color;
  document.getElementById('cd-days').textContent=days;
  const label=w?w.countdown_label:'Neste arrangement';
  document.getElementById('cd-text').innerHTML=days===0
    ?`<strong>${next.name}</strong> starter i dag!`
    :`${label}: <strong>${next.name}</strong> – ${fmtDate(next.start_date)}`;
}

function nextUpcoming(evList){
  return evList.filter(e=>{const s=new Date(e.start_date);s.setHours(0,0,0,0);return s>=TODAY;})
    .sort((a,b)=>new Date(a.start_date)-new Date(b.start_date))[0]||null;
}
function daysUntil(d){const dt=new Date(d);dt.setHours(0,0,0,0);return Math.round((dt-TODAY)/86400000);}
function isActiveNow(ev){const s=new Date(ev.start_date);s.setHours(0,0,0,0);const e=new Date(ev.end_date);e.setHours(23,59,59,0);return TODAY>=s&&TODAY<=e;}

function setView(v){
  currentView=v;
  document.getElementById('view-wheel').style.display=v==='wheel'?'flex':'none';
  document.getElementById('view-list').style.display=v==='list'?'flex':'none';
  document.getElementById('btn-wheel').classList.toggle('active',v==='wheel');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  closeDetail();
  if(v==='list')renderTimeline();
}

// Wheel tabs
function renderWheelTabs(){
  const cont=document.getElementById('wheel-tabs');
  cont.innerHTML=wheels.map(w=>`
    <div class="wheel-tab${w.id===currentWheelId?' active':''}" onclick="switchWheel('${w.id}')">
      <div class="tab-dot" style="background:${w.color}"></div>
      <span>${w.name}</span>
      <button class="tab-settings" onclick="event.stopPropagation();openWheelModal('${w.id}')" title="Innstillinger">⚙</button>
    </div>`).join('')+
    `<button class="btn-add-wheel" onclick="openWheelModal(null)">+ Nytt årshjul</button>`;
}

async function switchWheel(id){
  currentWheelId=id; selectedMonth=null; selectedId=null;
  closeDetail();
  renderWheelTabs();
  await loadEvents();
}

// Wheel modal
let wheelColorSelected='#5A7FBB';
function openWheelModal(id){
  editingWheelId=id;
  document.getElementById('wheel-modal-title').textContent=id?'Innstillinger':'Nytt årshjul';
  document.getElementById('w-delete-btn').style.display=id?'block':'none';
  if(id){
    const w=wheels.find(x=>x.id===id);
    document.getElementById('w-name').value=w.name;
    document.getElementById('w-item-label').value=w.item_label||'';
    document.getElementById('w-event-label').value=w.event_label||'';
    document.getElementById('w-countdown-label').value=w.countdown_label||'';
    document.getElementById('w-hendelse-color').checked=w.hendelse_color||false;
    document.getElementById('w-single-day').checked=w.single_day||false;
    document.getElementById('w-readonly').checked=w.readonly||false;
    document.getElementById('w-show-hendelser').checked=w.show_hendelser!==false;
    document.getElementById('w-show-notes').checked=w.show_notes!==false;
    wheelColorSelected=w.color||'#5A7FBB';
  } else {
    document.getElementById('w-name').value='';
    document.getElementById('w-item-label').value='';
    document.getElementById('w-event-label').value='';
    document.getElementById('w-countdown-label').value='';
    document.getElementById('w-default-list').checked=false;
    document.getElementById('w-single-day').checked=false;
    document.getElementById('w-readonly').checked=false;
    document.getElementById('w-show-hendelser').checked=true;
    document.getElementById('w-show-notes').checked=true;
    wheelColorSelected=COLORS[0];
  }
  buildWheelColorGrid();
  document.getElementById('wheel-modal-bg').classList.add('open');
}
function closeWheelModal(){document.getElementById('wheel-modal-bg').classList.remove('open');editingWheelId=null;}

function buildWheelColorGrid(){
  document.getElementById('wheel-color-grid').innerHTML=COLORS.map(c=>
    `<div class="color-swatch${c===wheelColorSelected?' selected':''}" style="background:${c}" onclick="pickWheelColor('${c}')"></div>`
  ).join('');
}
function pickWheelColor(c){
  wheelColorSelected=c;
  document.querySelectorAll('#wheel-color-grid .color-swatch').forEach(s=>{
    s.classList.remove('selected');
    if(rgbToHex(s.style.backgroundColor).toLowerCase()===c.toLowerCase())s.classList.add('selected');
  });
}

async function saveWheel(){
  const name=document.getElementById('w-name').value.trim();
  if(!name){toast('Gi årshjulet et navn');return;}
  const payload={
    name,color:wheelColorSelected,
    item_label:document.getElementById('w-item-label').value.trim()||'Arrangement',
    event_label:document.getElementById('w-event-label').value.trim()||'Hendelse',
    countdown_label:document.getElementById('w-countdown-label').value.trim()||'Neste arrangement',
    hendelse_color:document.getElementById('w-hendelse-color').checked,
    countdown_hendelse:document.getElementById('w-countdown-hendelse').checked,
    default_view:document.getElementById('w-default-list').checked?'list':'wheel',
    single_day:document.getElementById('w-single-day').checked,
    readonly:document.getElementById('w-readonly').checked,
    show_hendelser:document.getElementById('w-show-hendelser').checked,
    show_notes:document.getElementById('w-show-notes').checked,
  };
  if(editingWheelId){
    const res=await api.updateWheel(editingWheelId,payload);
    if(Array.isArray(res)&&res[0]){const i=wheels.findIndex(w=>w.id===editingWheelId);wheels[i]=res[0];}
  } else {
    const res=await api.saveWheel(payload);
    if(Array.isArray(res)&&res[0]){wheels.push(res[0]);currentWheelId=res[0].id;}
  }
  closeWheelModal();renderWheelTabs();applyWheelSettings();applyFilter();
  toast(editingWheelId?'Årshjul oppdatert':'Årshjul opprettet');
}

async function deleteWheel(){
  if(!editingWheelId||!confirm('Slett dette årshjulet og alle elementer i det?'))return;
  await api.deleteWheel(editingWheelId);
  wheels=wheels.filter(w=>w.id!==editingWheelId);
  currentWheelId=wheels[0]?.id||null;
  closeWheelModal();renderWheelTabs();
  if(currentWheelId)await loadEvents();
  else {events=[];filteredEvents=[];drawWheel();renderSidebar();renderLegend();}
  toast('Årshjul slettet');
}

// Canvas
const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');

function getEventsForMonth(m,src){
  return (src||filteredEvents).filter(e=>{
    const s=new Date(e.start_date),en=new Date(e.end_date);
    s.setHours(12);en.setHours(12);
    for(let d=new Date(s);d<=en;d.setDate(d.getDate()+1))
      if(d.getFullYear()===currentYear&&d.getMonth()===m)return true;
    return false;
  });
}

function dateToAngle(ds){
  const d=new Date(ds);d.setHours(12);
  const s=new Date(currentYear,0,1),e=new Date(currentYear+1,0,1);
  return((d-s)/(e-s))*2*Math.PI-Math.PI/2;
}

function drawWheel(){
  ctx.clearRect(0,0,620,620);tooltipData=[];
  for(let m=0;m<12;m++){
    const sa=(m/12)*2*Math.PI-Math.PI/2,ea=((m+1)/12)*2*Math.PI-Math.PI/2,isSel=selectedMonth===m;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,OR,sa,ea);ctx.closePath();
    ctx.fillStyle=RING_COLORS[m]+(isSel?'ee':'44');ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  }
  filteredEvents.forEach(ev=>{
    const s=new Date(ev.start_date),e=new Date(ev.end_date);
    if(s.getFullYear()>currentYear||e.getFullYear()<currentYear)return;
    const cs=new Date(Math.max(s,new Date(currentYear,0,1)));
    const ce=new Date(Math.min(e,new Date(currentYear,11,31)));
    const sa=dateToAngle(cs.toISOString().split('T')[0]);
    const ea=dateToAngle(ce.toISOString().split('T')[0]);
    ctx.beginPath();ctx.arc(CX,CY,OR-1,sa,ea);ctx.arc(CX,CY,OR-EVENT_ARC_W,ea,sa,true);
    ctx.closePath();ctx.fillStyle=ev.color;ctx.fill();
  });
  filteredEvents.forEach(ev=>{
    parseHendelser(ev.hendelser).forEach(h=>{
      if(new Date(h.date).getFullYear()!==currentYear)return;
      const ang=dateToAngle(h.date);
      const dx=CX+HENDELSE_R*Math.cos(ang),dy=CY+HENDELSE_R*Math.sin(ang);
      const dotColor=h.color||ev.color;
      ctx.beginPath();ctx.arc(dx,dy,HENDELSE_DOT_R,0,2*Math.PI);
      ctx.fillStyle=dotColor;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      tooltipData.push({x:dx,y:dy,r:HENDELSE_DOT_R+4,text:`${ev.name}\n${h.name}\n${fmtDate(h.date)}`});
    });
  });
  for(let m=0;m<12;m++){
    const sa=(m/12)*2*Math.PI-Math.PI/2,ea=((m+1)/12)*2*Math.PI-Math.PI/2;
    const evts=getEventsForMonth(m),isSel=selectedMonth===m;
    const mid=(sa+ea)/2,lr=(OR+IR)/2-10;
    const tx=CX+lr*Math.cos(mid),ty=CY+lr*Math.sin(mid);
    ctx.save();ctx.translate(tx,ty);
    const inBottom=mid>Math.PI/2&&mid<3*Math.PI/2;
    ctx.rotate(inBottom?mid-Math.PI/2:mid+Math.PI/2);
    ctx.fillStyle=isSel?'#fff':'#222';ctx.font=`${isSel?'600':'400'} 13px system-ui`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(MONTHS[m].substring(0,3),0,evts.length?-8:0);
    if(evts.length){ctx.font='400 11px system-ui';ctx.fillStyle=isSel?'rgba(255,255,255,0.85)':'#666';ctx.fillText(evts.length+' arr.',0,8);}
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(CX,CY,IR,0,2*Math.PI);ctx.fillStyle='#f5f4f0';ctx.fill();ctx.strokeStyle='#ddd';ctx.lineWidth=1;ctx.stroke();
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)*(620/r.width)-CX,y=(e.clientY-r.top)*(620/r.height)-CY;
  const dist=Math.sqrt(x*x+y*y);if(dist<IR||dist>OR)return;
  let ang=Math.atan2(y,x)+Math.PI/2;if(ang<0)ang+=2*Math.PI;
  selectedMonth=Math.floor((ang/(2*Math.PI))*12);
  closeDetail();drawWheel();renderSidebar();
});

function setupTooltip(){
  const tip=document.getElementById('tooltip');
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(620/r.width),my=(e.clientY-r.top)*(620/r.height);
    const found=tooltipData.find(td=>{const dx=mx-td.x,dy=my-td.y;return Math.sqrt(dx*dx+dy*dy)<=td.r;});
    if(found){tip.style.display='block';tip.innerHTML=found.text.replace(/\n/g,'<br>');tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';}
    else tip.style.display='none';
  });
  canvas.addEventListener('mouseleave',()=>document.getElementById('tooltip').style.display='none');
}

function nextHendelseText(ev){
  const up=parseHendelser(ev.hendelser).filter(h=>{const d=new Date(h.date);d.setHours(0,0,0,0);return d>=TODAY;}).sort((a,b)=>a.date.localeCompare(b.date));
  if(!up.length)return '';
  const h=up[0],days=daysUntil(h.date);
  return days===0?`${h.name} i dag`:`${h.name}: ${fmtDate(h.date)}`;
}

function renderSidebar(){
  const w=cw(),list=document.getElementById('evt-list');
  if(selectedMonth===null){document.getElementById('sel-month').textContent='—';document.getElementById('sel-count').textContent='';list.innerHTML='<p class="empty">Klikk på en måned</p>';return;}
  const evts=getEventsForMonth(selectedMonth);
  document.getElementById('sel-month').textContent=MONTHS[selectedMonth]+' '+currentYear;
  document.getElementById('sel-count').textContent=evts.length?evts.length+' '+(w?.item_label||'element')+(evts.length>1?'er':''):'Ingen elementer';
  list.innerHTML=evts.length?evts.map(ev=>{
    const live=isActiveNow(ev),nh=nextHendelseText(ev);
    return `<div class="evt-item${live?' active-now':''}" style="border-left-color:${ev.color}">
      <div class="evt-item-body" onclick="showDetail('${ev.id}')">
        <div class="en">${ev.name}${live?'<span class="badge-live">Pågår nå</span>':''}</div>
        <div class="ed">${fmtDate(ev.start_date)}${ev.start_date!==ev.end_date?' – '+fmtDate(ev.end_date):''}</div>
        ${nh?`<div class="next-h">↑ ${nh}</div>`:''}
      </div>
    </div>`;
  }).join(''):'<p class="empty">Ingen elementer denne måneden</p>';
}

function renderLegend(){
  const leg=document.getElementById('legend');
  const items=filteredEvents.filter(e=>new Date(e.start_date).getFullYear()===currentYear||new Date(e.end_date).getFullYear()===currentYear);
  leg.innerHTML=items.length?items.map(e=>`<div class="leg-item"><div class="leg-dot" style="background:${e.color}"></div><span>${e.name}</span></div>`).join(''):'<p class="empty">Ingen elementer ennå</p>';
}

function toggleLegend(){
  const leg=document.getElementById('legend'),btn=document.getElementById('legend-btn');
  const vis=leg.style.display!=='none';leg.style.display=vis?'none':'flex';btn.textContent=vis?'Vis':'Skjul';
}

function renderTimeline(){
  const w=cw(),cont=document.getElementById('timeline-items');
  const items=filteredEvents.filter(e=>new Date(e.start_date).getFullYear()===currentYear||new Date(e.end_date).getFullYear()===currentYear);
  if(!items.length){cont.innerHTML='<p class="empty" style="padding:16px">Ingen elementer funnet</p>';return;}
  const byMonth={};
  items.forEach(ev=>{const m=new Date(ev.start_date).getMonth();if(!byMonth[m])byMonth[m]=[];byMonth[m].push(ev);});
  cont.innerHTML=Object.keys(byMonth).sort((a,b)=>a-b).map(m=>{
    const rows=[];
    byMonth[m].sort((a,b)=>new Date(a.start_date)-new Date(b.start_date)).forEach(ev=>{
      let placed=false;
      for(const row of rows){if(new Date(ev.start_date)>new Date(row[row.length-1].end_date)){row.push(ev);placed=true;break;}}
      if(!placed)rows.push([ev]);
    });
    return `<div class="tl-month"><div class="tl-month-header">${MONTHS[m]} ${currentYear}</div><div class="tl-items">${
      rows.map(row=>`<div style="display:flex;gap:8px">${row.map(ev=>{
        const live=isActiveNow(ev);
        const hRows=w?.show_hendelser!==false?parseHendelser(ev.hendelser).sort((a,b)=>a.date.localeCompare(b.date)).map(h=>`<div class="tl-h-row"><div class="tl-h-dot"></div><span class="tl-h-date">${fmtDate(h.date)}</span><span>${h.name}</span></div>`).join(''):'';
        return `<div class="tl-item${live?' active-now':''}" style="flex:1;min-width:0" onclick="showDetail('${ev.id}')">
          <div class="tl-accent" style="background:${ev.color}"></div>
          <div class="tl-body">
            <div class="tl-name">${ev.name}${live?'<span class="badge-live-tl">Pågår nå</span>':''}</div>
            <div class="tl-dates">${fmtDate(ev.start_date)}${ev.start_date!==ev.end_date?' – '+fmtDate(ev.end_date):''}</div>
            ${hRows?`<div class="tl-hendelser">${hRows}</div>`:''}
          </div></div>`;
      }).join('')}</div>`).join('')
    }</div></div>`;
  }).join('');
}

function parseHendelser(raw){if(!raw)return[];try{return JSON.parse(raw);}catch{return[];}}

function showDetail(id){
  selectedId=id;
  const ev=events.find(e=>e.id===id),w=cw();if(!ev)return;
  document.getElementById('det-dot').style.background=ev.color;
  document.getElementById('det-name').textContent=ev.name;
  document.getElementById('det-dates').textContent=fmtDate(ev.start_date)+(ev.start_date!==ev.end_date?' – '+fmtDate(ev.end_date):'');
  document.getElementById('det-notes').textContent=ev.notes||'(Ingen notater)';
  document.getElementById('det-notes-section').style.display=w?.show_notes!==false?'block':'none';
  document.getElementById('det-hendelser-title').textContent=w?.event_label||'Hendelser';
  renderDetailHendelser(ev,w);
  const ro=w?.readonly;
  document.getElementById('det-actions').innerHTML=ro
    ?`<button class="btn-sec" onclick="closeDetail()">Lukk</button>`
    :`<button class="btn-sec" onclick="editSelected()">Rediger</button><button class="btn-del" onclick="deleteSelected()">Slett</button><button class="btn-sec" onclick="closeDetail()">Lukk</button>`;
  const card=document.getElementById('detail-card');card.style.display='block';
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function renderDetailHendelser(ev,w){
  const hendelser=parseHendelser(ev.hendelser);
  const section=document.getElementById('det-hendelser-section');
  if(!hendelser.length||w?.show_hendelser===false){section.style.display='none';return;}
  section.style.display='block';
  document.getElementById('det-hendelser').innerHTML=hendelser.sort((a,b)=>a.date.localeCompare(b.date)).map((h,i)=>`
    <div class="hendelse-row">
      <span class="h-date">${fmtDate(h.date)}</span>
      <span class="h-name">${h.name}</span>
      ${w?.readonly?'':`<button class="h-del" onclick="deleteHendelse('${ev.id}',${i})">×</button>`}
    </div>`).join('');
}

async function deleteHendelse(evId,idx){
  const ev=events.find(e=>e.id===evId);if(!ev)return;
  const h=parseHendelser(ev.hendelser);h.splice(idx,1);ev.hendelser=JSON.stringify(h);
  await api.updateEvent(evId,{hendelser:ev.hendelser});
  renderDetailHendelser(ev,cw());renderTimeline();toast('Hendelse slettet');
}
function closeDetail(){document.getElementById('detail-card').style.display='none';selectedId=null;}
function editSelected(){if(selectedId)openEventModal(selectedId);}
async function deleteSelected(){
  if(!selectedId||!confirm('Slett dette elementet?'))return;
  await api.deleteEvent(selectedId);
  events=events.filter(e=>e.id!==selectedId);closeDetail();applyFilter();toast('Element slettet');
}

// Event modal
function openEventModal(id){
  const w=cw();
  editingId=id;pendingHendelser=[];
  document.getElementById('event-modal-title').textContent=id?`Rediger ${w?.item_label||'element'}`:`Nytt ${w?.item_label||'element'}`;
  document.getElementById('lbl-name').textContent=(w?.item_label||'Element')+' navn';
  document.getElementById('lbl-hendelse').textContent=w?.event_label||'Hendelser';
  document.getElementById('hendelser-section').style.display=w?.show_hendelser!==false?'block':'none';
  document.getElementById('notes-section').style.display=w?.show_notes!==false?'block':'none';
  const singleDay = w?.single_day;
  document.getElementById('lbl-start-date').textContent = singleDay ? 'Dato' : 'Startdato';
  document.getElementById('end-date-col').style.display = singleDay ? 'none' : 'block';
  if(id){
    const ev=events.find(e=>e.id===id);
    document.getElementById('f-name').value=ev.name;
    document.getElementById('f-start').value=ev.start_date;
    document.getElementById('f-end').value=ev.end_date;
    document.getElementById('f-end').min=ev.start_date;
    document.getElementById('f-notes').value=ev.notes||'';
    selectedColor=ev.color;
    pendingHendelser=[...parseHendelser(ev.hendelser)];
  } else {
    document.getElementById('f-name').value='';
    document.getElementById('f-start').value='';
    document.getElementById('f-end').value='';
    document.getElementById('f-notes').value='';
    selectedColor=COLORS[0];
  }
  buildColorGrid();renderPendingHendelser();renderHendelseAdd();
  document.getElementById('event-modal-bg').classList.add('open');
}
function closeEventModal(){document.getElementById('event-modal-bg').classList.remove('open');editingId=null;pendingHendelser=[];}

function buildColorGrid(){
  document.getElementById('color-grid').innerHTML=COLORS.map(c=>
    `<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  const cc=document.getElementById('custom-color');
  cc.value=selectedColor;
  cc.oninput=e=>{selectedColor=e.target.value;document.querySelectorAll('#color-grid .color-swatch').forEach(s=>s.classList.remove('selected'));};
}
function pickColor(c){
  selectedColor=c;
  document.querySelectorAll('#color-grid .color-swatch').forEach(s=>{s.classList.remove('selected');if(rgbToHex(s.style.backgroundColor).toLowerCase()===c.toLowerCase())s.classList.add('selected');});
  document.getElementById('custom-color').value=c;
}
function onStartChange(){
  const start=document.getElementById('f-start').value,endEl=document.getElementById('f-end');
  endEl.min=start;if(!endEl.value||endEl.value<start)endEl.value=start;
}
function rgbToHex(rgb){const m=rgb.match(/\d+/g);if(!m)return rgb;return '#'+m.slice(0,3).map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');}

function addHendelse(){
  const w=cw();
  const d=document.getElementById('h-date').value,n=document.getElementById('h-name').value.trim();
  if(!d||!n){toast('Fyll ut dato og navn');return;}
  const color=w?.hendelse_color?document.getElementById('h-color').value:null;
  pendingHendelser.push({date:d,name:n,...(color?{color}:{})});
  document.getElementById('h-date').value='';document.getElementById('h-name').value='';
  renderPendingHendelser();
}

function renderHendelseAdd(){
  const w=cw();
  const showColor=w?.hendelse_color;
  document.getElementById('h-color-wrap').style.display=showColor?'flex':'none';
}
function removeHendelse(i){pendingHendelser.splice(i,1);renderPendingHendelser();}
function renderPendingHendelser(){
  const w=cw();
  document.getElementById('h-preview').innerHTML=pendingHendelser.map((h,i)=>`
    <div class="hp-row">
      ${h.color?`<div style="width:10px;height:10px;border-radius:50%;background:${h.color};flex-shrink:0"></div>`:''}
      <span><b>${fmtDate(h.date)}</b> – ${h.name}</span>
      <button onclick="removeHendelse(${i})">×</button>
    </div>`).join('');
}

async function saveEvent(){
  const w=cw();
  const name=document.getElementById('f-name').value.trim();
  const start=document.getElementById('f-start').value;
  const end=w?.single_day?start:document.getElementById('f-end').value;
  const notes=document.getElementById('f-notes').value.trim();
  if(!name){toast('Fyll ut navn');return;}
  if(!start){toast('Fyll ut dato');return;}
  try{
    const payload={name,start_date:start,end_date:end||start,color:selectedColor,notes,hendelser:JSON.stringify(pendingHendelser),wheel_id:currentWheelId};
    if(editingId){
      const res=await api.updateEvent(editingId,payload);
      if(Array.isArray(res)&&res[0]){const i=events.findIndex(e=>e.id===editingId);if(i>-1)events[i]=res[0];}
      else{const data=await api.getEvents(currentWheelId);if(Array.isArray(data))events=data;}
    } else {
      const res=await api.saveEvent(payload);
      if(Array.isArray(res)&&res[0])events.push(res[0]);
      else{const data=await api.getEvents(currentWheelId);if(Array.isArray(data))events=data;}
    }
    closeEventModal();applyFilter();toast(editingId?'Oppdatert':'Lagt til');
  }catch(e){toast('Noe gikk galt');console.error(e);}
}

function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${parseInt(day)}. ${MONTHS[parseInt(m)-1].toLowerCase()} ${y}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

init();
</script>
</body>
</html>
